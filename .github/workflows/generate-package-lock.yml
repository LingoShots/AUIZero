name: Generate package lock

on:
  push:
    branches:
      - add-npm-lock-file

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: add-npm-lock-file
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Generate package-lock.json
        run: npm install --package-lock-only --ignore-scripts --registry=https://registry.npmjs.org
      - name: Remove temporary workflow and commit lock file
        run: |
          rm .github/workflows/generate-package-lock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json .github/workflows/generate-package-lock.yml
          git commit -m "Add npm lock file" || exit 0
          git push origin add-npm-lock-file
